site_name: HeLLMholtz Documentation
site_description: Documentation for HeLLMholtz - Unified LLM access, benchmarking, and reporting
site_author: jhe24
repo_url: https://github.com/JonasHeinickeBio/HeLLMholtz
repo_name: JonasHeinickeBio/HeLLMholtz

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Available Models: models.md
  - Model Monitoring: monitoring.md
  - Publishing: publishing.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - tables

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JonasHeinickeBio/HeLLMholtz
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/hellmholtz/
